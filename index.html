<!-- Load jQuery from CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
   var backEndURL = 'https://creativity-x-server.onrender.com';
    // var backEndURL = 'https://gema-nonfermentative-nonflagitiously.ngrok-free.dev';
    $(document).ready(function () {
        $("#generateImageButton").on("click", function () {
            var imgPromotTxt = $('#imagePrompTextBox').val();
            if (imgPromotTxt.trim().length) {
                $('#required').css('display', 'none');
            } else {
                $('#required').css('display', 'block');
                return false;
            }
            $('#searchedMotionImgDiv').html("");
            $('#searchedImgDiv').html("");
            $('#loader').css('display', 'block');
            $('#confirmImageMotionDiv').css('display', 'none');
            $('#searched_val').val('');
            $.ajax({
                url: `${backEndURL}/fetch-image`,
                data: { prompt: imgPromotTxt },
                method: "GET",
                dataType: "json",
                // headers: {
                //     "ngrok-skip-browser-warning": "true"
                // },
                success: function (response) {
                    $('#loader').css('display', 'none');
                    if (response?.data?.image) {
                        $('#searched_val').val(response.data.search_val);
                        $('#searchedImgDiv').html("");
                        $('#searchedImgDiv').prepend('<img id="img" height="500" width="500" src="' + response.data.image + '" />')
                        if (!response?.data?.isMotion) {
                            $('#confirmImageMotionDiv').css('display', 'block');
                        }
                    } else {
                        $('#searchedImgDiv').html("");
                        $('#searchedImgDiv').prepend('<label id="noRecord">No record found</label>');
                    }
                },
                error: function (xhr, status, error) {
                    $("#result").html(`<p class="error">Error: ${error}</p>`);
                }
            });
        });
    });

    function confirmImageMotion(val) {
        if (val == 'yes') {
            var seachedVal = $('#searched_val').val();
            $('#searchedMotionImgDiv').html("");
            $('#motionloader').css('display', 'block');
            $('#confirmImageMotionDiv').css('display', 'none');
            $.ajax({
                url: `${backEndURL}/fetch-motion-image`,
                data: { prompt: seachedVal },
                method: "GET",
                dataType: "json",
                // headers: {
                //     "ngrok-skip-browser-warning": "true"
                // },
                success: function (response) {
                    $('#motionloader').css('display', 'none');
                    if (response?.data?.image) {
                        $('#searchedMotionImgDiv').html("");
                        $('#searchedMotionImgDiv').prepend('<img id="img" height="500" width="500" src="' + response.data.image + '" />');
                    } else {
                        $('#searchedMotionImgDiv').html("");
                        $('#searchedMotionImgDiv').prepend('<label id="noRecord">No record found</label>');
                    }
                },
                error: function (xhr, status, error) {
                    $("#result").html(`<p class="error">Error: ${error}</p>`);
                }
            });
        }
    }

</script>
